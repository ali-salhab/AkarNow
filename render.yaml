services:
  # ─── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: aqarnow-api
    env: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false           # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OTP_BYPASS
        value: "true"         # Switch to false after Twilio is configured
      - key: DEV_OTP
        value: "123456"       # Fixed OTP used when OTP_BYPASS=true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ─── Admin Dashboard (Static Site) ────────────────────────────────────────
  - type: web
    name: aqarnow-admin
    env: static
    plan: free
    region: frankfurt
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://aqarnow-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
