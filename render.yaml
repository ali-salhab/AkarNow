services:
  # ─── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: aqarnow-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OTP_BYPASS
        value: false
      - key: ADMIN_EMAIL
        sync: false          # e.g. admin@aqarnow.com
      - key: ADMIN_PASSWORD
        sync: false          # Strong password, set in dashboard

  # ─── Admin Dashboard (Static Site) ────────────────────────────────────────
  - type: web
    name: aqarnow-admin
    env: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your deployed backend URL: https://aqarnow-api.onrender.com/api
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
